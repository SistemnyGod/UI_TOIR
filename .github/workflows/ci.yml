name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Restore .NET
        run: dotnet restore .\Patrol360.slnx

      - name: Build .NET
        run: dotnet build .\Patrol360.slnx --no-restore

      - name: Structure tests
        run: dotnet run --project .\tests\Patrol360.Structure.Tests\Patrol360.Structure.Tests.csproj --no-restore

      - name: Encoding check
        run: .\tools\Verify-TextEncoding.ps1

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Verify frontend
        working-directory: apps/web
        run: npm run verify

      - name: Frontend structural tests
        working-directory: apps/web
        run: npm run test:run
