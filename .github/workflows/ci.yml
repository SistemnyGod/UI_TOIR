name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            Мобильное приложение/package-lock.json

      - name: Restore .NET
        run: dotnet restore .\Patrol360.slnx

      - name: Build .NET
        run: dotnet build .\Patrol360.slnx --no-restore

      - name: Format .NET
        run: dotnet format .\Patrol360.slnx --verify-no-changes --no-restore

      - name: Prepare test result directories
        run: New-Item -ItemType Directory -Force -Path .\TestResults\dotnet, .\TestResults\vitest | Out-Null

      - name: Structure tests
        run: dotnet run --project .\tests\Patrol360.Structure.Tests\Patrol360.Structure.Tests.csproj --no-restore

      - name: Test .NET
        run: dotnet test .\Patrol360.slnx --no-build --logger trx --results-directory .\TestResults\dotnet

      - name: Encoding check
        run: .\tools\Verify-TextEncoding.ps1

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Verify frontend
        working-directory: apps/web
        run: npm run verify

      - name: Install mobile dependencies
        working-directory: Мобильное приложение
        run: npm ci

      - name: Verify mobile offline, auth and sync safeguards
        working-directory: Мобильное приложение
        run: npm run verify

      - name: Frontend structural tests
        working-directory: apps/web
        run: npm run test:ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install chromium

      - name: Frontend e2e tests
        working-directory: apps/web
        run: npm run test:e2e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: ignore
          path: |
            TestResults/**
            apps/web/test-results/**
            apps/web/playwright-report/**
