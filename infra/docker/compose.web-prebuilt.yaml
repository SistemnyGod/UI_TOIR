services:
  web:
    image: docker-web:latest
    depends_on: !reset []
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prebuilt
      pull: false
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
