services:
  postgres:
    image: postgres:17-alpine
    container_name: patrol360-postgres
    environment:
      POSTGRES_DB: patrol360
      POSTGRES_USER: patrol360
      POSTGRES_PASSWORD: patrol360_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: patrol360-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: patrol360-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: patrol360-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: patrol360
      MINIO_ROOT_PASSWORD: patrol360_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
