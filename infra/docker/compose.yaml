services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: patrol360-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Patrol360: Host=postgres;Port=5432;Database=patrol360;Username=patrol360;Password=patrol360_dev
    ports:
      - "5080:8080"
    profiles:
      - app

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: patrol360-web
    depends_on:
      - api
    ports:
      - "5173:80"
    profiles:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: patrol360-postgres
    environment:
      POSTGRES_DB: patrol360
      POSTGRES_USER: patrol360
      POSTGRES_PASSWORD: patrol360_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patrol360 -d patrol360"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: patrol360-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: patrol360-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: patrol360-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: patrol360
      MINIO_ROOT_PASSWORD: patrol360_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
